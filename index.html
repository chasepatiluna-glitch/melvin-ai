<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 350px;
      height: 500px;
      background: #111827;
      display: flex;
      flex-direction: column;
      border-radius: 10px;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .msg {
      padding: 8px;
      margin: 5px;
      border-radius: 8px;
      max-width: 80%;
    }

    .user {
      background: blue;
      align-self: flex-end;
    }

    .ai {
      background: gray;
      align-self: flex-start;
    }

    .input {
      display: flex;
    }

    input {
      flex: 1;
      padding: 10px;
    }

    button {
      padding: 10px;
      background: green;
      color: white;
      border: none;
    }
  </style>

</head>

<body>

<div class="box">

  <div id="messages"></div>

  <div class="input">
    <input id="msg" placeholder="Type message..." />
    <button onclick="send()">Send</button>
  </div>

</div>

<script>
async function send() {

  let msg = document.getElementById("msg").value;
  if (!msg) return;

  addMessage(msg, "user");

  document.getElementById("msg").value = "";

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: msg })
  });

  const data = await res.json();

  addMessage(data.reply, "ai");
}

function addMessage(text, type) {
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  document.getElementById("messages").appendChild(div);
}
</script>

</body>
</html>
