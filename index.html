<!DOCTYPE html>
<html>
<head>
  <title>Melvin AI Chat</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-box {
      width: 350px;
      height: 500px;
      background: #111827;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      padding: 15px;
      background: #1f2937;
      font-weight: bold;
      text-align: center;
    }

    #messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .msg {
      padding: 8px 12px;
      margin: 5px;
      border-radius: 10px;
      max-width: 80%;
    }

    .user {
      background: #2563eb;
      align-self: flex-end;
      text-align: right;
    }

    .ai {
      background: #374151;
      align-self: flex-start;
    }

    .input-area {
      display: flex;
      border-top: 1px solid #333;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      border: none;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="chat-box">
  <div class="header">🤖 Melvin AI Chat</div>

  <div id="messages"></div>

  <div class="input-area">
    <input id="msg" placeholder="Type message..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
async function send() {
  let msg = document.getElementById("msg").value;
  if (!msg) return;

  addMessage(msg, "user");

  document.getElementById("msg").value = "";

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: msg })
  });

  const data = await res.json();

  addMessage(data.reply, "ai");
}

function addMessage(text, type) {
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  document.getElementById("messages").appendChild(div);
  document.getElementById("messages").scrollTop =
    document.getElementById("messages").scrollHeight;
}
</script>

</body>
</html>
