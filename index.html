<!DOCTYPE html>
<html>
<head>
  <title>AI Chat Messenger</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-box {
      width: 360px;
      height: 520px;
      background: #111827;
      display: flex;
      flex-direction: column;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .header {
      background: #1f2937;
      padding: 15px;
      text-align: center;
      color: white;
      font-weight: bold;
    }

    #messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ===== MESSENGER STYLE BUBBLES ===== */

    .msg {
      padding: 10px 14px;
      border-radius: 18px;
      max-width: 75%;
      font-size: 14px;
      word-wrap: break-word;
    }

    .user {
      background: #2563eb;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 5px;
    }

    .ai {
      background: #374151;
      color: white;
      align-self: flex-start;
      border-bottom-left-radius: 5px;
    }

    /* INPUT AREA */
    .input-area {
      display: flex;
      border-top: 1px solid #333;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
    }

    button {
      padding: 12px 15px;
      border: none;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

  </style>
</head>

<body>

<div class="chat-box">

  <div class="header">🤖 AI Messenger Chat</div>

  <div id="messages"></div>

  <div class="input-area">
    <input id="msg" placeholder="Type message..." />
    <button onclick="send()">Send</button>
  </div>

</div>

<script>

async function send() {

  let msg = document.getElementById("msg").value;
  if (!msg) return;

  addMessage(msg, "user");

  document.getElementById("msg").value = "";

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: msg
    })
  });

  const data = await res.json();

  addMessage(data.reply, "ai");
}

/* ===== CHAT BUBBLES ===== */

function addMessage(text, type) {
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  document.getElementById("messages").appendChild(div);

  document.getElementById("messages").scrollTop =
    document.getElementById("messages").scrollHeight;
}

</script>

</body>
</html>
