
<!DOCTYPE html>
<html>
<head>
  <title>Melvin AI</title>
</head>
<body>

<h2>🔥 Melvin AI WORKING</h2>

<input id="msg" placeholder="Type message">
<button onclick="send()">Send</button>

<p id="out"></p>

<script>
function send(){
  let msg = document.getElementById("msg").value;
  document.getElementById("out").innerText = "You: " + msg;
}
</script>
